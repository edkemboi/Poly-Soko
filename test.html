<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poly-Soko DB Test</title>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
body { font-family: monospace; background: #0D0F12; color: #F0F2F5; padding: 20px; font-size: 13px; }
.box { background: #161A20; border: 1px solid #333; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
.ok  { color: #00C076; }
.err { color: #FF4D4D; }
.warn { color: #F5C842; }
h2 { color: #F5C842; margin-bottom: 16px; }
pre { white-space: pre-wrap; word-break: break-all; }
</style>
</head>
<body>
<h2>🔬 Poly-Soko Connection Test</h2>
<div id="out"></div>

<script>
const { createClient } = supabase;
const SUPABASE_URL = 'https://yeesbftbjgkcqlwioadd.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InllZXNiZnRiamdrY3Fsd2lvYWRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNDkxOTUsImV4cCI6MjA4ODcyNTE5NX0.GUtbhGiUNJ71T6o-Kj_Zg2M27vF0swlAONTq9vubJcQ';

const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
const out = document.getElementById('out');

function log(label, data, isErr) {
  const div = document.createElement('div');
  div.className = 'box';
  div.innerHTML = `<div class="${isErr ? 'err' : 'ok'}">${label}</div><pre>${JSON.stringify(data, null, 2)}</pre>`;

out.appendChild(div);
}

async function runTests() {
log(‘⏳ Starting tests…’, {url: SUPABASE_URL}, false);

// Test 1: markets
try {
const { data, error, status } = await sb.from(‘markets’).select(‘id, question, status’).limit(3);
if (error) log(‘❌ markets SELECT failed’, {error, status}, true);
else log(‘✅ markets SELECT ok — ’ + (data?.length||0) + ’ rows’, data, false);
} catch(e) { log(‘💥 markets EXCEPTION’, {message: e.message}, true); }

// Test 2: users
try {
const { data, error, status } = await sb.from(‘users’).select(‘id, full_name, role’).limit(3);
if (error) log(‘❌ users SELECT failed’, {error, status}, true);
else log(‘✅ users SELECT ok — ’ + (data?.length||0) + ’ rows’, data, false);
} catch(e) { log(‘💥 users EXCEPTION’, {message: e.message}, true); }

// Test 3: bets
try {
const { data, error, status } = await sb.from(‘bets’).select(‘id’).limit(1);
if (error) log(‘❌ bets SELECT failed’, {error, status}, true);
else log(‘✅ bets SELECT ok — ’ + (data?.length||0) + ’ rows’, data, false);
} catch(e) { log(‘💥 bets EXCEPTION’, {message: e.message}, true); }

// Test 4: transactions
try {
const { data, error, status } = await sb.from(‘transactions’).select(‘id’).limit(1);
if (error) log(‘❌ transactions SELECT failed’, {error, status}, true);
else log(‘✅ transactions SELECT ok — ’ + (data?.length||0) + ’ rows’, data, false);
} catch(e) { log(‘💥 transactions EXCEPTION’, {message: e.message}, true); }

log(‘🏁 Tests complete’, {}, false);
}

runTests();
</script>

</body>
</html>
