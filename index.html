<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poly-Soko -- Prediction Markets</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

<style>
:root {
  --bg:        #0D0F12;
  --surface:   #161A20;
  --surface2:  #1E2330;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.13);
  --text:      #F0F2F5;
  --muted:     #6B7280;
  --green:     #00C076;
  --green-dim: rgba(0,192,118,0.12);
  --red:       #FF4D4D;
  --red-dim:   rgba(255,77,77,0.12);
  --gold:      #F5C842;
  --blue:      #4E9EFF;
  --radius:    12px;
  --radius-sm: 8px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  min-height: 100vh;
  line-height: 1.5;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

/* ── NAVBAR ── */
nav {
  position: fixed; top:0; left:0; right:0; z-index:200;
  height: 60px;
  background: rgba(13,15,18,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 24px;
  gap: 16px;
}

.nav-logo {
  font-family: 'Fraunces', serif;
  font-size: 1.3rem;
  color: var(--text);
  letter-spacing: -0.5px;
  display: flex; align-items: center; gap: 8px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(0,192,118,0.4); }
  50% { box-shadow: 0 0 0 6px rgba(0,192,118,0); }
}

.nav-tabs {
  display: flex; gap: 2px;
  overflow-x: auto; flex:1;
  scrollbar-width: none;
}
.nav-tabs::-webkit-scrollbar { display:none; }

.nav-tab {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border: none; background: transparent;
  white-space: nowrap;
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.nav-tab:hover { color: var(--text); background: var(--surface2); }
.nav-tab.active { color: var(--text); background: var(--surface2); }

.nav-right {
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}

.nav-balance {
  font-family: 'DM Mono', monospace;
  font-size: 0.82rem;
  color: var(--green);
  background: var(--green-dim);
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid rgba(0,192,118,0.2);
}

.btn {
  padding: 7px 16px;
  border-radius: 20px;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.2px;
}
.btn-primary { background: var(--green); color: #000; }
.btn-primary:hover { background: #00d984; transform: scale(1.02); }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
.btn-ghost:hover { background: var(--surface); border-color: var(--border2); }

/* ── LAYOUT ── */
.layout {
  display: grid;
  grid-template-columns: 220px 1fr 300px;
  gap: 0;
  padding-top: 60px;
  min-height: 100vh;
  max-width: 1400px;
  margin: 0 auto;
}

/* ── LEFT SIDEBAR ── */
.sidebar-left {
  padding: 24px 16px;
  border-right: 1px solid var(--border);
  position: sticky; top: 60px;
  height: calc(100vh - 60px);
  overflow-y: auto;
}

.sidebar-section { margin-bottom: 28px; }

.sidebar-label {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 0 8px;
  margin-bottom: 8px;
}

.sidebar-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--muted);
  font-size: 0.88rem;
  font-weight: 500;
  transition: all 0.15s;
  border: none; background: transparent;
  width: 100%;
  text-align: left;
}
.sidebar-item:hover, .sidebar-item.active {
  background: var(--surface2);
  color: var(--text);
}
.sidebar-item.active { color: var(--green); }

.sidebar-icon { font-size: 1rem; width: 20px; text-align: center; }

.sidebar-badge {
  margin-left: auto;
  background: var(--surface2);
  color: var(--muted);
  font-size: 0.7rem;
  padding: 2px 7px;
  border-radius: 10px;
  font-family: 'DM Mono', monospace;
}

/* ── MAIN FEED ── */
.main-feed { padding: 20px 24px; }

.feed-header {
  display: flex; justify-content: space-between;
  align-items: center; margin-bottom: 20px;
  gap: 16px; flex-wrap: wrap;
}

.feed-title {
  font-family: 'Fraunces', serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text);
}

.feed-controls { display: flex; gap: 8px; align-items: center; }

.sort-btn {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.sort-btn:hover, .sort-btn.active {
  background: var(--surface2);
  color: var(--text);
  border-color: var(--border2);
}

/* ── BETA BANNER ── */
.beta-banner {
  background: linear-gradient(135deg, rgba(245,200,66,0.1), rgba(78,158,255,0.08));
  border: 1px solid rgba(245,200,66,0.25);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 20px;
  display: flex; align-items: center; gap: 12px;
}
.beta-tag {
  background: var(--gold);
  color: #000;
  font-size: 0.65rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  letter-spacing: 1px;
  flex-shrink: 0;
}
.beta-text { font-size: 0.82rem; color: rgba(240,242,245,0.7); }

/* ── MARKET CARD ── */
.markets-list { display: flex; flex-direction: column; gap: 2px; }

.market-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  cursor: pointer;
  transition: all 0.18s;
  animation: fadeUp 0.4s ease both;
  position: relative;
  overflow: hidden;
}

@keyframes fadeUp {
  from { opacity:0; transform: translateY(12px); }
  to   { opacity:1; transform: translateY(0); }
}

.market-card:hover {
  border-color: var(--border2);
  background: var(--surface2);
  transform: translateY(-1px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.card-top {
  display: flex; gap: 14px; align-items: flex-start;
  margin-bottom: 14px;
}

.card-icon {
  width: 44px; height: 44px;
  border-radius: 10px;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;

.outcome-pill {
  flex: 1;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: space-between;
  border: 1px solid var(--border);
  background: var(--bg);
  cursor: pointer;
  transition: all 0.15s;
  gap: 8px;
}

.outcome-pill.yes:hover { border-color: var(--green); background: var(--green-dim); }
.outcome-pill.no:hover  { border-color: var(--red);   background: var(--red-dim); }

.outcome-label {
  font-size: 0.78rem; font-weight: 600;
  display: flex; align-items: center; gap: 5px;
}
.outcome-label.yes-label { color: var(--green); }
.outcome-label.no-label  { color: var(--red); }

.outcome-pct {
  font-family: 'DM Mono', monospace;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text);
}

/* ── PROB BAR ── */
.prob-bar-wrap { margin-bottom: 12px; }
.prob-bar-track {
  height: 3px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
}
.prob-bar-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(to right, var(--green), #00e88a);
  transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
}

/* ── CARD FOOTER ── */
.card-footer {
  display: flex; justify-content: space-between;
  align-items: center;
  font-size: 0.75rem; color: var(--muted);
}

.card-vol {
  font-family: 'DM Mono', monospace;
  color: var(--muted);
}
.card-vol span { color: var(--gold); }

.card-close { display: flex; align-items: center; gap: 4px; }

.resolved-stamp {
  position: absolute; top: 14px; right: 14px;
  font-size: 0.65rem; font-weight: 700;
  padding: 4px 10px;
  border-radius: 4px;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.stamp-yes { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,192,118,0.3); }
.stamp-no  { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(255,77,77,0.3); }

/* ── RIGHT SIDEBAR ── */
.sidebar-right {
  padding: 24px 16px;
  border-left: 1px solid var(--border);
  position: sticky; top: 60px;
  height: calc(100vh - 60px);
  overflow-y: auto;
}

.widget {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
}

.widget-title {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.stat-row {
  display: flex; justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.82rem;
}
.stat-row:last-child { border-bottom: none; }
.stat-label { color: var(--muted); }
.stat-val { font-family: 'DM Mono', monospace; color: var(--text); font-weight: 500; }
.stat-val.green { color: var(--green); }
.stat-val.gold  { color: var(--gold); }

.tipster-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.tipster-row:last-child { border-bottom: none; }
.tipster-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem;
  border: 1px solid var(--border);
  flex-shrink: 0;
}
.tipster-info { flex: 1; min-width: 0; }
.tipster-name { font-size: 0.82rem; font-weight: 600; color: var(--text); }
.tipster-stats { font-size: 0.72rem; color: var(--muted); }
.tipster-pct { font-family: 'DM Mono', monospace; font-size: 0.82rem; color: var(--green); font-weight: 600; }

/* ── MODALS ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 300; justify-content: center; align-items: center;
  padding: 20px;
  backdrop-filter: blur(6px);
}
.overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 28px;
  width: 100%; max-width: 440px;
  position: relative;
  animation: modalIn 0.25s cubic-bezier(0.16,1,0.3,1);
}

@keyframes modalIn {
  from { opacity:0; transform: scale(0.93) translateY(16px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}

.modal-close {
  position: absolute; top:16px; right:18px;
  background: var(--surface2); border: none;
  color: var(--muted); font-size: 1.1rem;
  cursor: pointer; border-radius: 50%;
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.modal-close:hover { color: var(--text); background: var(--bg); }

.modal-title {
  font-family: 'Fraunces', serif;
  font-size: 1.4rem; font-weight: 700;
  margin-bottom: 4px;
}
.modal-sub { font-size: 0.82rem; color: var(--muted); margin-bottom: 24px; }

.field { margin-bottom: 16px; }
.field-label {
  font-size: 0.72rem; font-weight: 600;
  color: var(--muted); letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 8px;
}
.field-input {
  width: 100%; padding: 11px 14px;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text); font-size: 0.92rem;
  font-family: 'DM Sans', sans-serif;
  outline: none; transition: border-color 0.15s;
}
.field-input:focus { border-color: var(--green); }
.field-input::placeholder { color: var(--muted); }

select.field-input { cursor: pointer; }
textarea.field-input { resize: none; }

.input-prefix-wrap {
  display: flex; align-items: center;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  overflow: hidden;
  transition: border-color 0.15s;
}
.input-prefix-wrap:focus-within { border-color: var(--green); }
.input-prefix {
  padding: 11px 12px;
  background: var(--surface2);
  color: var(--gold);
  font-family: 'DM Mono', monospace;
  font-size: 0.82rem;
  border-right: 1px solid var(--border2);
  flex-shrink: 0;
}
.input-prefix-wrap input {
  flex:1; padding: 11px 14px;
  background: transparent; border: none;
  color: var(--text); font-size: 0.92rem;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  font-weight: 600;
}

.preset-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.preset { 
  padding: 4px 12px;
  border-radius: 20px; border: 1px solid var(--border2);
  background: transparent; color: var(--muted);
  font-size: 0.75rem; cursor: pointer;
  transition: all 0.15s; font-family: 'DM Sans', sans-serif;
}
.preset:hover { border-color: var(--gold); color: var(--gold); background: rgba(245,200,66,0.06); }

.choice-grid { display: grid; grid-template-columns:1fr 1fr; gap: 10px; margin-bottom: 16px; }
.choice-btn {
  padding: 14px; border-radius: var(--radius-sm);
  border: 2px solid var(--border2);
  background: transparent; color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem; font-weight: 700;
  cursor: pointer; transition: all 0.18s;
  letter-spacing: 1px;
}
.choice-btn.yes:hover, .choice-btn.yes.sel {
  border-color: var(--green); background: var(--green-dim); color: var(--green);
}
.choice-btn.no:hover, .choice-btn.no.sel {
  border-color: var(--red); background: var(--red-dim); color: var(--red);
}

.payout-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  display: flex; justify-content: space-between;
  align-items: center; margin-bottom: 18px;
}
.payout-label { font-size: 0.78rem; color: var(--muted); }
.payout-val { font-family: 'DM Mono', monospace; font-size: 1.1rem; color: var(--gold); font-weight: 600; }

.btn-full { width: 100%; padding: 13px; font-size: 0.95rem; border-radius: var(--radius-sm); }

.slider-wrap { margin-bottom: 4px; }
.slider-row { display: flex; align-items: center; gap: 12px; }
.slider-row input[type=range] { flex:1; accent-color: var(--green); cursor: pointer; }
.slider-pct { font-family: 'DM Mono', monospace; font-size: 0.9rem; color: var(--green); min-width: 42px; text-align:right; }
.slider-hint { display: flex; justify-content: space-between; font-size: 0.67rem; color: var(--muted); margin-top:3px; }

.divider { height:1px; background: var(--border); margin: 18px 0; }

/* ── AUTH TABS ── */
.auth-tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--bg); border-radius: var(--radius-sm); padding: 4px; }
.auth-tab { flex:1; padding: 8px; border-radius: 6px; border:none; background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.auth-tab.active { background: var(--surface2); color: var(--text); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 28px; right: 28px;
  padding: 12px 20px; border-radius: var(--radius-sm);
  font-size: 0.85rem; font-weight: 600;
  z-index: 500; transform: translateY(80px); opacity: 0;
  transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
  display: flex; align-items: center; gap: 8px;
  max-width: 320px;
}
.toast.show { transform: translateY(0); opacity:1; }
.toast.success { background: var(--green); color: #000; }
.toast.error   { background: var(--red);   color: #fff; }
.toast.info    { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }/* ── EMPTY STATE ── */
.empty {
  text-align: center; padding: 60px 20px;
  color: var(--muted);
}
.empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
.empty-title { font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.empty-sub { font-size: 0.82rem; }

/* ── PROFILE MODAL ── */
.profile-header {
  display: flex; align-items: center; gap: 16px;
  padding: 20px 0; border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.profile-avatar {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; border: 2px solid var(--border2); flex-shrink: 0;
}
.profile-name { font-size: 1.1rem; font-weight: 700; color: var(--text); }
.profile-role { font-size: 0.78rem; color: var(--muted); margin-top: 2px; text-transform: capitalize; }
.profile-balance { font-family: 'DM Mono', monospace; font-size: 0.88rem; color: var(--green); margin-top: 4px; }

.profile-stats {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 8px; margin-bottom: 20px;
}
.pstat {
  background: var(--surface2); border-radius: var(--radius-sm);
  padding: 12px; text-align: center; border: 1px solid var(--border);
}
.pstat-val { font-family: 'DM Mono', monospace; font-size: 1rem; font-weight: 600; color: var(--text); }
.pstat-label { font-size: 0.68rem; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

.bet-history-list { display: flex; flex-direction: column; gap: 8px; max-height: 340px; overflow-y: auto; }
.bet-history-item {
  background: var(--surface2); border-radius: var(--radius-sm);
  padding: 12px 14px; border: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
}
.bet-history-q { font-size: 0.82rem; color: var(--text); font-weight: 500; flex: 1; line-height: 1.3; }
.bet-history-meta { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }
.bet-history-right { text-align: right; flex-shrink: 0; }
.bet-choice-badge { font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; margin-bottom: 4px; display: inline-block; }
.bet-choice-badge.yes { background: var(--green-dim); color: var(--green); }
.bet-choice-badge.no  { background: var(--red-dim);   color: var(--red); }
.bet-stake { font-family: 'DM Mono', monospace; font-size: 0.82rem; color: var(--text); }
.bet-status-won  { color: var(--green); font-size: 0.72rem; font-weight: 600; }
.bet-status-lost { color: var(--red);   font-size: 0.72rem; font-weight: 600; }
.bet-status-open { color: var(--gold);  font-size: 0.72rem; font-weight: 600; }

/* ── LOGOUT LINK ── */
.logout-link {
  font-size: 0.82rem; color: var(--red); cursor: pointer;
  background: none; border: none; font-family: 'DM Sans', sans-serif;
  font-weight: 500; padding: 9px 10px; border-radius: var(--radius-sm);
  width: 100%; text-align: left; display: flex; align-items: center; gap: 10px;
  transition: all 0.15s;
}
.logout-link:hover { background: var(--red-dim); }

/* ── LOADING ── */
.skeleton {
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius-sm);
}
@keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }

/* ── MOBILE ── */
@media(max-width:900px) {
  .sidebar-left { display:none; }
  .sidebar-right { display:none; }
  .layout { grid-template-columns: 1fr; }
  nav { padding: 0 16px; }
  .main-feed { padding: 16px; }
  .nav-tabs { display:none; }
}
</style>

function formatTime(ms) {
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  if (h > 24) return `${Math.floor(h/24)}d`;
  if (h > 0)  return `${h}h ${m}m`;
  return `${m}m`;
}

let forgotMobile = null;

async function sendForgotOTP() {
  const mobile = document.getElementById('forgot-mobile').value.trim().replace(/\s/g,'');
  if (!mobile) { showToast('Enter your mobile number', 'error'); return; }

  // Check if mobile exists
  const { data } = await sb.from('users').select('id, full_name').eq('mobile', mobile).maybeSingle();
  if (!data) { showToast('Mobile number not found', 'error'); return; }

  // Generate 6-digit OTP and store in Supabase otp_verifications
  generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
  forgotMobile = mobile;

  const expires = new Date(Date.now() + 10 * 60 * 1000).toISOString(); // 10 min
  await sb.from('otp_verifications').insert({
    mobile,
    code_hash: btoa(generatedOTP),
    purpose: 'reset_pin',
    expires_at: expires,
    used: false,
  });

  // Show OTP in toast (in production this would be an SMS via Africa's Talking)
  showToast('OTP: ' + generatedOTP + ' (save this!)', 'info');
  document.getElementById('reset-sub').textContent = `OTP sent to ${mobile}. Valid for 10 minutes.`;
  switchAuthTab('reset');
}

async function confirmResetPIN() {
  const otp  = document.getElementById('reset-otp').value.trim();
  const pin1 = document.getElementById('reset-pin1').value.trim();
  const pin2 = document.getElementById('reset-pin2').value.trim();

  if (!otp)  { showToast('Enter the OTP', 'error'); return; }
  if (!pin1 || pin1.length !== 4 || isNaN(pin1)) { showToast('PIN must be 4 digits', 'error'); return; }
  if (pin1 !== pin2) { showToast('PINs do not match', 'error'); return; }

  // Verify OTP from Supabase
  const { data: otpRow } = await sb
    .from('otp_verifications')
    .select('*')
    .eq('mobile', forgotMobile)
    .eq('purpose', 'reset_pin')
    .eq('used', false)
    .order('created_at', { ascending: false })
    .limit(1)
    .maybeSingle();

  if (!otpRow) { showToast('OTP expired or invalid. Request a new one.', 'error'); return; }
  if (new Date(otpRow.expires_at) < new Date()) { showToast('OTP has expired. Request a new one.', 'error'); return; }
  if (otpRow.code_hash !== btoa(otp)) { showToast('Incorrect OTP', 'error'); return; }

  // Update PIN
  await sb.from('users').update({ pin_hash: btoa(pin1) }).eq('mobile', forgotMobile);
  await sb.from('otp_verifications').update({ used: true }).eq('id', otpRow.id);

  showToast('PIN reset successfully! Sign in with your new PIN.', 'success');
  forgotMobile = null;
  generatedOTP = null;
  switchAuthTab('login');
}

      setTimeout(() => checkDepositStatus(), 15000);
    } else {
      throw new Error(data.detail || data.message || JSON.stringify(data));
    }
  } catch (err) {
    showToast('Deposit failed: ' + err.message, 'error');
    btn.textContent = 'Send STK Push →';
    btn.disabled = false;
  }
}

async function checkDepositStatus() {
  if (!currentInvoiceId) return;
  try {
    const res  = await fetch(`/api/check-payment?invoice_id=${currentInvoiceId}`);
    const data = await res.json();
    const state = data.invoice?.state || data.state;

    if (state === 'COMPLETE') {
      const amount = data.invoice?.net_amount || data.net_amount;
      const newBal = Number(currentUser.balance_ksh) + Number(amount);
      await sb.from('users').update({ balance_ksh: newBal }).eq('id', currentUser.id);
      await sb.from('transactions').insert({
        user_id: currentUser.id, type: 'deposit',
        amount_ksh: amount, ref_id: currentInvoiceId, balance_after: newBal,
      });
      currentUser.balance_ksh = newBal;
      document.getElementById('nav-balance').textContent = 'KSh ' + newBal.toLocaleString() + ' 💳';
      closeModal('deposit-modal');
      showToast(`KSh ${Number(amount).toLocaleString()} deposited! 🎉`);
      currentInvoiceId = null;
    } else if (state === 'FAILED' || state === 'CANCELLED') {
      showToast('Payment ' + state.toLowerCase() + '. Try again.', 'error');
      document.getElementById('dep-status').style.display = 'none';
      const btn = document.getElementById('dep-btn');
      btn.textContent = 'Send STK Push →';
      btn.disabled = false;
      btn.style.display = '';
      currentInvoiceId = null;
    } else {
      showToast('Still waiting... tap again in a moment', 'info');
    }
  } catch (err) {
    showToast('Could not check status -- try again', 'error');
  }
}

// ── WITHDRAWAL ────────────────────────────────────────────────────────────────
function openWithdraw() {
  if (!currentUser) { openAuth(); return; }
  const mobile = currentUser.mobile.replace('+254','').replace(/\s/g,'');
  document.getElementById('with-phone').value  = mobile;
  document.getElementById('with-amount').value = '';
  document.getElementById('withdraw-balance').textContent = 'KSh ' + Number(currentUser.balance_ksh).toLocaleString();
  document.getElementById('with-net').textContent = 'KSh 0';
  document.getElementById('withdraw-modal').classList.add('open');
}

document.addEventListener('input', function(e) {
  if (e.target.id === 'with-amount') {
    const amt = parseInt(e.target.value) || 0;
    const fee = Math.max(20, Math.round(amt * 0.01));
    const net = Math.max(0, amt - fee);
    document.getElementById('with-net').textContent = `KSh ${net.toLocaleString()} (fee: KSh ${fee})`;
  }
});

async function initiateWithdrawal() {
  const phone  = '254' + document.getElementById('with-phone').value.trim().replace(/^0/,'');
  const amount = parseInt(document.getElementById('with-amount').value);
  const fee    = Math.max(20, Math.round(amount * 0.01));
  const net    = amount - fee;

  if (!amount || amount < 200)          { showToast('Minimum withdrawal is KSh 200', 'error'); return; }
  if (amount > currentUser.balance_ksh) { showToast('Insufficient balance', 'error'); return; }
  if (!phone || phone.length < 12)      { showToast('Enter a valid M-Pesa number', 'error'); return; }

  try {
    const res  = await fetch('/api/withdraw', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, amount: net, name: currentUser.full_name }),
    });
    const data = await res.json();

    if (data.status === 'Preview' || data.status === 'Sending' || data.tracking_id) {
      const newBal = Number(currentUser.balance_ksh) - amount;
      await sb.from('users').update({ balance_ksh: newBal }).eq('id', currentUser.id);
      await sb.from('transactions').insert({
        user_id: currentUser.id, type: 'withdrawal',
        amount_ksh: -amount, ref_id: data.tracking_id || 'pending', balance_after: newBal,
      });
      currentUser.balance_ksh = newBal;
      document.getElementById('nav-balance').textContent = 'KSh ' + newBal.toLocaleString() + ' 💳';
      closeModal('withdraw-modal');
      showToast(`KSh ${net.toLocaleString()} sent to your M-Pesa! 💸`);
    } else {
      throw new Error(data.detail || data.message || JSON.stringify(data));
    }
  } catch (err) {
    showToast('Withdrawal failed: ' + err.message, 'error');
  }
}

// ── START ────────────────────────────────────────────────────────────────────
init();
</script>
